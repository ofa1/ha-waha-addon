name: "WAHA WhatsApp API"
version: "0.1.4"
slug: "waha_whatsapp_api"
description: "Self-hosted WAHA WhatsApp HTTP API for HAOS; useful for dedicated WhatsApp Channel posting automation."
url: "https://github.com/ofa1/ha-waha-addon"
arch:
  - aarch64
startup: services
boot: auto
init: false
stage: experimental
panel_icon: mdi:whatsapp
panel_title: WAHA
# Browser access is routed through Home Assistant ingress. The internal Nginx
# proxy listens on 8099 and forwards/rewrite requests to WAHA on 3000.
ingress: true
ingress_port: 8099
ingress_entry: "/"
ingress_stream: true
ports:
  3000/tcp: null
ports_description:
  3000/tcp: "Optional direct WAHA Dashboard/API host port fallback. Leave disabled when using Home Assistant ingress."
map:
  - type: addon_config
    read_only: false
options:
  # Leave blank to auto-generate on first start and persist under /data/.secrets.env.
  # Set explicitly only if you want to rotate or manage credentials yourself.
  api_key: ""
  dashboard_enabled: true
  dashboard_username: "admin"
  # Leave blank to auto-generate on first start and persist under /data/.secrets.env.
  dashboard_password: ""
  default_engine: "GOWS"
  local_store_base_dir: "/data/.sessions"
  log_level: "info"
  timezone: "America/Toronto"
schema:
  api_key: "str"
  dashboard_enabled: "bool"
  dashboard_username: "str"
  dashboard_password: "password"
  default_engine: "list(GOWS|NOWEB|WEBJS)"
  local_store_base_dir: "str"
  log_level: "list(error|warn|info|debug|trace)"
  timezone: "str"
